<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenamiento</title>
    <link rel="icon" type="image/png" href="assets/trap.png">
    <link rel="stylesheet" href="style.css"> <style>
        .workout-container {
            max-width: 500px;
            margin: 50px auto;
            text-align: center;
            padding: 20px;
        }
        .exercise-image {
            width: 100%;
            height: 250px;
            background: #eee;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .exercise-image img { width: 100%; height: 100%; object-fit: cover; }
        
        .timer-display {
            font-size: 4rem;
            font-weight: 800;
            margin: 20px 0;
            color: var(--reloj-actual);
        }
        .status-msg { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; }
        .next-info { color: #666; margin-bottom: 30px; }
        
        .controls { display: flex; gap: 10px; justify-content: center; }
        .btn-finish { background: #ff4757; color: white; border: none; padding: 15px 30px; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="workout-container">
        <div id="exercise-view">
            <div class="exercise-image" id="image-container">
             <img src="assets/descanso6.jpg" alt="" srcset="">
            </div>
            
            <div class="status-msg" id="exercise-name">¡Prepárate!</div>
            <div class="next-info" id="series-info">La rutina está por comenzar</div>
            
            <div class="timer-display" id="timer">00:15</div>
            
            <div class="controls">
                <button class="btn-primary" id="btn-next">EMPEZAR</button>
                <button class="btn-finish" onclick="intentarCerrar()">Terminar/Salir</button>
            </div>
        </div>
    </div>

    <script src="entrenamiento.js"></script>
</body>
</html>
